<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Next Level Tienda — Catálogo</title>
<meta name="description" content="Catálogo de ropa Next Level Tienda. Consultá disponibilidad por WhatsApp.">
<meta property="og:title" content="Next Level Tienda">
<meta property="og:description" content="Ropa y accesorios — Next Level Tienda">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⭐</text></svg>">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #111111;
    --bg2: #1a1a1a;
    --bg3: #222222;
    --border: #333333;
    --border2: #444444;
    --white: #f5f5f5;
    --gray: #999999;
    --gray2: #666666;
    --silver: #c0c0c0;
    --accent: #d4d4d4;
    --wa: #25D366;
    --radius: 12px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--white);
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: #0a0a0a;
    border-bottom: 1px solid var(--border);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo-img {
    height: 44px;
    width: auto;
    display: block;
  }
  .header-right {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .cart-btn {
    background: var(--bg3);
    border: 1px solid var(--border2);
    color: var(--white);
    border-radius: 20px;
    padding: 7px 14px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    position: relative;
  }
  .cart-badge {
    background: var(--wa);
    color: #fff;
    border-radius: 50%;
    width: 18px;
    height: 18px;
    font-size: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    display: none;
  }
  .cart-badge.show { display: flex; }

  /* SEARCH + FILTERS */
  .search-wrap {
    padding: 12px 16px 0;
    background: var(--bg);
  }
  .search-inner {
    position: relative;
  }
  .search-input {
    width: 100%;
    padding: 10px 14px 10px 38px;
    border: 1px solid var(--border);
    border-radius: 10px;
    font-size: 14px;
    background: var(--bg2);
    color: var(--white);
    outline: none;
  }
  .search-input::placeholder { color: var(--gray2); }
  .search-input:focus { border-color: var(--silver); }
  .search-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--gray2);
    font-size: 16px;
    pointer-events: none;
  }

  .filters-wrap {
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 10px 16px;
    position: sticky;
    top: 68px;
    z-index: 99;
  }
  .filters {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .filters::-webkit-scrollbar { display: none; }
  .filter-btn {
    flex-shrink: 0;
    padding: 5px 13px;
    border-radius: 20px;
    border: 1px solid var(--border2);
    background: transparent;
    font-size: 12px;
    color: var(--gray);
    cursor: pointer;
    transition: all .15s;
    white-space: nowrap;
  }
  .filter-btn.active {
    background: var(--white);
    border-color: var(--white);
    color: var(--bg);
    font-weight: 500;
  }
  .filter-select {
    display: none;
    width: 100%;
    padding: 8px 12px;
    border-radius: 10px;
    border: 1px solid var(--border2);
    background: var(--bg2);
    color: var(--white);
    font-size: 14px;
    outline: none;
  }
  @media (max-width: 480px) {
    .filters { display: none; }
    .filter-select { display: block; }
  }

  /* GRID */
  main { padding: 14px; }
  .section-title {
    font-size: 11px;
    color: var(--gray2);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
  }

  .card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    cursor: pointer;
    transition: border-color .15s;
    position: relative;
  }
  .card:active { opacity: .85; }

  .card-img {
    width: 100%;
    aspect-ratio: 3/4;
    object-fit: cover;
    background: var(--bg3);
    display: block;
  }
  .card-img-placeholder {
    width: 100%;
    aspect-ratio: 3/4;
    background: var(--bg3);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 48px;
  }

  .badge-sin-stock {
    position: absolute;
    top: 8px;
    left: 8px;
    background: rgba(0,0,0,.75);
    color: var(--gray);
    font-size: 10px;
    font-weight: 500;
    padding: 3px 8px;
    border-radius: 20px;
    letter-spacing: 0.3px;
    backdrop-filter: blur(4px);
    border: 1px solid var(--border2);
  }
  .badge-nuevo {
    position: absolute;
    top: 8px;
    right: 8px;
    background: var(--silver);
    color: var(--bg);
    font-size: 10px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 20px;
    letter-spacing: 0.5px;
  }
  .badge-en-carrito {
    position: absolute;
    bottom: 8px;
    right: 8px;
    background: var(--wa);
    color: #fff;
    font-size: 10px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 20px;
  }

  .card-body {
    padding: 9px 11px 11px;
  }
  .card-nombre {
    font-size: 13px;
    font-weight: 500;
    color: var(--white);
    margin-bottom: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .card-precio {
    font-size: 15px;
    font-weight: 600;
    color: var(--silver);
    margin-bottom: 3px;
    letter-spacing: -0.3px;
  }
  .card-talles {
    font-size: 11px;
    color: var(--gray2);
  }

  /* SHEET */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.7);
    z-index: 200;
    display: none;
    align-items: flex-end;
    justify-content: center;
  }
  .overlay.open { display: flex; }

  .sheet {
    background: var(--bg2);
    border-radius: 20px 20px 0 0;
    border-top: 1px solid var(--border2);
    width: 100%;
    max-width: 480px;
    max-height: 90vh;
    overflow-y: auto;
    padding: 20px 20px 36px;
    transform: translateY(100%);
    transition: transform .25s cubic-bezier(.32,.72,0,1);
  }
  .overlay.open .sheet { transform: translateY(0); }

  .sheet-handle {
    width: 36px;
    height: 4px;
    background: var(--border2);
    border-radius: 2px;
    margin: 0 auto 18px;
  }

  .sheet-img {
    width: 100%;
    border-radius: var(--radius);
    aspect-ratio: 4/3;
    object-fit: cover;
    background: var(--bg3);
    margin-bottom: 14px;
  }
  .sheet-img-placeholder {
    width: 100%;
    border-radius: var(--radius);
    aspect-ratio: 4/3;
    background: var(--bg3);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 64px;
    margin-bottom: 14px;
  }

  .sheet-nombre {
    font-size: 19px;
    font-weight: 600;
    color: var(--white);
    letter-spacing: -0.4px;
    margin-bottom: 4px;
  }
  .sheet-precio {
    font-size: 22px;
    font-weight: 700;
    color: var(--silver);
    letter-spacing: -0.5px;
    margin-bottom: 10px;
  }
  .sheet-label {
    font-size: 10px;
    color: var(--gray2);
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }
  .sheet-desc {
    font-size: 14px;
    color: var(--gray);
    line-height: 1.6;
    margin-bottom: 12px;
  }
  .talles-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 18px;
  }
  .talle-chip {
    padding: 5px 12px;
    border: 1px solid var(--border2);
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    color: var(--white);
    background: var(--bg3);
  }

  .btn-carrito {
    width: 100%;
    background: var(--bg3);
    color: var(--white);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    padding: 13px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-bottom: 10px;
    transition: all .15s;
  }
  .btn-carrito:hover { border-color: var(--silver); }
  .btn-carrito.en-carrito {
    background: var(--wa);
    border-color: var(--wa);
    color: #fff;
  }
  .btn-wa-directo {
    width: 100%;
    background: var(--wa);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    padding: 13px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    text-decoration: none;
  }
  .btn-sin-stock {
    width: 100%;
    background: var(--bg3);
    color: var(--gray2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 13px;
    font-size: 14px;
    text-align: center;
    cursor: not-allowed;
  }

  /* CARRITO SHEET */
  .carrito-items { margin-bottom: 16px; }
  .carrito-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }
  .carrito-item:last-child { border-bottom: none; }
  .carrito-thumb {
    width: 50px;
    height: 50px;
    border-radius: 8px;
    background: var(--bg3);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    overflow: hidden;
  }
  .carrito-thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .carrito-info { flex: 1; min-width: 0; }
  .carrito-nombre {
    font-size: 13px;
    font-weight: 500;
    color: var(--white);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .carrito-precio { font-size: 12px; color: var(--silver); }
  .carrito-remove {
    background: none;
    border: none;
    color: var(--gray2);
    cursor: pointer;
    font-size: 18px;
    padding: 4px;
    flex-shrink: 0;
  }

  .carrito-total {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 0;
    border-top: 1px solid var(--border2);
    margin-bottom: 14px;
  }
  .carrito-total-label { font-size: 13px; color: var(--gray); }
  .carrito-total-val { font-size: 18px; font-weight: 600; color: var(--silver); }

  .btn-wa-carrito {
    width: 100%;
    background: var(--wa);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    padding: 15px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    letter-spacing: -0.2px;
  }

  .carrito-vacio {
    text-align: center;
    padding: 40px 20px;
    color: var(--gray2);
  }
  .carrito-vacio-icon { font-size: 40px; margin-bottom: 10px; }

  /* EMPTY/LOADING */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--gray2);
  }
  .loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 60px 20px;
    gap: 12px;
  }
  .spinner {
    width: 28px;
    height: 28px;
    border: 2.5px solid var(--border2);
    border-top-color: var(--silver);
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* WA FLOAT */
  .wa-float {
    position: fixed;
    bottom: 80px;
    right: 20px;
    width: 50px;
    height: 50px;
    background: var(--wa);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 150;
    text-decoration: none;
    box-shadow: 0 4px 20px rgba(37,211,102,.3);
  }
  .wa-float svg { width: 26px; height: 26px; fill: #fff; }

  input[type=file] { display: none; }
</style>
</head>

<script>

let productos = [];
let filtroActivo = 'Todos';
let searchTerm = '';
let carrito = []; // array de ids

// ── INIT ──
async function init() {
  await cargarProductos();
document.getElementById('filter-select')?.addEventListener('change', function() {
  filtroActivo = this.value;
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.toggle('active', b.textContent === this.value);
  });
  renderProductos();
});
}

// Exponer funciones al scope global para el select
window.setFiltro = function(cat, btn) {
  filtroActivo = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  const sel = document.getElementById('filter-select');
  if(sel) sel.value = cat;
  renderProductos();
};

async function cargarProductos() {
  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/catalogo_productos?select=*&order=created_at.desc`,
      { headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` } }

    productos = await res.json();
    if (!Array.isArray(productos)) productos = [];
  } catch(e) { productos = []; }
  renderCategorias();
  renderGrid();
  document.getElementById('loading').style.display = 'none';
  document.getElementById('grid-wrap').style.display = 'block';
}

// ── CATEGORÍAS ──
function renderCategorias() {
  const cats = ['Todos', ...new Set(productos.map(p => p.categoria).filter(Boolean))];
  document.getElementById('filters').innerHTML = cats.map(c =>
    `<button class="filter-btn ${c === filtroActivo ? 'active' : ''}" onclick="setFiltro('${c}', this)">${c}</button>`
  ).join('');
  const sel = document.getElementById('filter-select');
  if(sel) {
    sel.innerHTML = cats.map(c => `<option value="${c}" ${c === filtroActivo ? 'selected' : ''}>${c}</option>`).join('');
  }
}

function setFiltroSelect(sel) {
  filtroActivo = sel.value;
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.toggle('active', b.textContent === sel.value);
  });
  renderProductos();
}

function setFiltro(cat, btn) {
  filtroActivo = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderGrid();
}

function filtrar() {
  searchTerm = document.getElementById('search-input').value.toLowerCase().trim();
  renderGrid();
}

// ── GRID ──
function renderGrid() {
  const filtered = productos.filter(p => {
    const matchCat = filtroActivo === 'Todos' || p.categoria === filtroActivo;
    const matchS = !searchTerm ||
      (p.nombre||'').toLowerCase().includes(searchTerm) ||
      (p.descripcion||'').toLowerCase().includes(searchTerm) ||
      (p.talles||'').toLowerCase().includes(searchTerm);
    return matchCat && matchS;
  });

  const grid = document.getElementById('grid');
  const empty = document.getElementById('empty');
  const counter = document.getElementById('counter');

  const disp = filtered.filter(p => p.disponible !== false);
  const sin = filtered.filter(p => p.disponible === false);
  const ord = [...disp, ...sin];

  counter.textContent = `${disp.length} producto${disp.length !== 1 ? 's' : ''} disponible${disp.length !== 1 ? 's' : ''}`;

  if (ord.length === 0) { grid.innerHTML = ''; empty.style.display = 'block'; return; }
  empty.style.display = 'none';

  grid.innerHTML = ord.map((p, i) => {
    const foto = Array.isArray(p.fotos) && p.fotos[0];
    const sinStock = p.disponible === false;
    const esNuevo = i < 3 && !sinStock;
    const enCarrito = carrito.includes(p.id);
    const stockBajo = p.stock != null && p.stock > 0 && p.stock <= 3 && !sinStock;
    return `
    <div class="card" onclick="abrirSheet(${productos.indexOf(p)})" style="${sinStock ? 'opacity:.5' : ''}">
      ${foto
        ? `<img class="card-img" src="${foto}" alt="${p.nombre||''}" loading="lazy">`
        : `<div class="card-img-placeholder">👕</div>`}
      ${sinStock ? '<span class="badge-sin-stock">Sin stock</span>' : ''}
      ${stockBajo ? `<span class="badge-sin-stock" style="background:rgba(200,100,0,.85);border-color:#a05000">⚡ Últimas ${p.stock}</span>` : ''}
      ${esNuevo && !sinStock ? '<span class="badge-nuevo">✨ NUEVO</span>' : ''}
      ${enCarrito ? '<span class="badge-en-carrito">✓ En carrito</span>' : ''}
      <div class="card-body">
        <div class="card-nombre">${p.nombre || ''}</div>
        <div class="card-precio">${formatPrecio(p.precio)}</div>
        <div class="card-talles">${p.talles ? 'Talles: ' + p.talles : ''}</div>
      </div>
    </div>`;
  }).join('');
}

// ── SHEET PRODUCTO ──
let sheetIdx = -1;
function abrirSheet(idx) {
  sheetIdx = idx;
  const p = productos[idx];
  const foto = Array.isArray(p.fotos) && p.fotos[0];
  const sinStock = p.disponible === false;
  const enCarrito = carrito.includes(p.id);

  document.getElementById('sheet-content').innerHTML = `
    ${foto
      ? `<img class="sheet-img" src="${foto}" alt="${p.nombre||''}">`
      : `<div class="sheet-img-placeholder">👕</div>`}
    <div class="sheet-nombre">${p.nombre || ''}</div>
    <div class="sheet-precio">${formatPrecio(p.precio)}</div>
    ${p.descripcion ? `<div class="sheet-label">Descripción</div><div class="sheet-desc">${p.descripcion}</div>` : ''}
    ${p.talles ? `
    <div class="sheet-label">Talles</div>
    <div class="talles-row">${p.talles.split(',').map(t => `<span class="talle-chip">${t.trim()}</span>`).join('')}</div>` : ''}
    ${p.stock != null && !sinStock ? `<div class="sheet-label" style="margin-top:8px">Stock disponible: <b style="color:${p.stock<=3?'#e07820':'var(--silver)'}">${p.stock} unidad${p.stock!==1?'es':''}</b></div>` : ''}
    ${sinStock
      ? `<div class="btn-sin-stock">Sin stock por ahora</div>`
      : `
        <button class="btn-carrito ${enCarrito ? 'en-carrito' : ''}" id="btn-carrito-sheet" onclick="toggleCarrito('${p.id}')">
          ${enCarrito ? '✓ En el carrito' : '🛒 Agregar al carrito'}
        </button>
        <a class="btn-wa-directo" href="${buildWAlink([p])}" target="_blank">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="#fff"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
          Consultar solo este
        </a>`
    }
  `;
  document.getElementById('overlay-prod').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeSheet(e, id) {
  if (e.target === document.getElementById(id)) {
    document.getElementById(id).classList.remove('open');
    document.body.style.overflow = '';
  }
}

// ── CARRITO ──
function toggleCarrito(id) {
  if (carrito.includes(id)) {
    carrito = carrito.filter(x => x !== id);
  } else {
    carrito.push(id);
  }
  actualizarBadge();
  renderGrid();
  // Actualizar botón del sheet
  const btn = document.getElementById('btn-carrito-sheet');
  if (btn) {
    const enCarrito = carrito.includes(id);
    btn.textContent = enCarrito ? '✓ En el carrito' : '🛒 Agregar al carrito';
    btn.className = `btn-carrito ${enCarrito ? 'en-carrito' : ''}`;
  }
}

function actualizarBadge() {
  const badge = document.getElementById('cart-badge');
  badge.textContent = carrito.length;
  badge.className = `cart-badge ${carrito.length > 0 ? 'show' : ''}`;
}

function abrirCarrito() {
  renderCarritoSheet();
  document.getElementById('overlay-cart').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function renderCarritoSheet() {
  const content = document.getElementById('carrito-content');
  if (carrito.length === 0) {
    content.innerHTML = `
      <div class="carrito-vacio">
        <div class="carrito-vacio-icon">🛒</div>
        <div>Tu carrito está vacío</div>
        <div style="font-size:12px;color:var(--gray2);margin-top:6px">Agregá productos para consultar todo junto</div>
      </div>`;
    return;
  }

  const items = carrito.map(id => productos.find(p => p.id === id)).filter(Boolean);
  const total = items.reduce((s, p) => s + (p.precio || 0), 0);

  content.innerHTML = `
    <div class="carrito-items">
      ${items.map(p => {
        const foto = Array.isArray(p.fotos) && p.fotos[0];
        return `
        <div class="carrito-item">
          <div class="carrito-thumb">
            ${foto ? `<img src="${foto}" alt="${p.nombre||''}">` : '👕'}
          </div>
          <div class="carrito-info">
            <div class="carrito-nombre">${p.nombre || ''}</div>
            <div class="carrito-precio">${formatPrecio(p.precio)}</div>
          </div>
          <button class="carrito-remove" onclick="quitarDelCarrito('${p.id}')">✕</button>
        </div>`;
      }).join('')}
    </div>
    <div class="carrito-total">
      <span class="carrito-total-label">Total estimado</span>
      <span class="carrito-total-val">${formatPrecio(total)}</span>
    </div>
    <button class="btn-wa-carrito" onclick="enviarCarritoWA()">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="#fff"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
      Enviar todo por WhatsApp
    </button>
    <p style="font-size:11px;color:var(--gray2);text-align:center;margin-top:10px">Te contactamos para coordinar el envío 🚚</p>
  `;
}

function quitarDelCarrito(id) {
  carrito = carrito.filter(x => x !== id);
  actualizarBadge();
  renderGrid();
  renderCarritoSheet();
}

function enviarCarritoWA() {
  const items = carrito.map(id => productos.find(p => p.id === id)).filter(Boolean);
  const link = buildWAlink(items);
  window.open(link, '_blank');
}

function buildWAlink(items) {
  const lista = items.map(p => `• *${p.nombre}* — ${formatPrecio(p.precio)}${p.talles ? ' (talles: ' + p.talles + ')' : ''}`).join('\n');
  const msg = items.length === 1
    ? `Hola! Vi el catálogo de Next Level Tienda y me interesa:\n${lista}\n\n¿Cómo puedo coordinar el envío a domicilio? 😊`
    : `Hola! Vi el catálogo de Next Level Tienda y me interesan estos productos:\n\n${lista}\n\n¿Cómo puedo coordinar el envío a domicilio? 😊`;
  return `https://wa.me/${WA_NUMBER}?text=${encodeURIComponent(msg)}`;
}

// ── UTILS ──
function formatPrecio(p) {
  if (!p && p !== 0) return '';
  return '$' + parseInt(p).toLocaleString('es-AR');
}

init();
</script>
